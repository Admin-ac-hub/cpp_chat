name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libmysqlclient-dev \
            libgtest-dev \
            pkg-config \
            python3

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build

      - name: Unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Start MySQL
        run: |
          docker compose -f docker/docker-compose.yml up -d mysql
          timeout 120 bash -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" cpp_chat_mysql)" = "healthy" ]; do sleep 2; done'

      - name: MySQL connection pool tests
        env:
          CPP_CHAT_TEST_MYSQL: "1"
          CPP_CHAT_DB_HOST: 127.0.0.1
          CPP_CHAT_DB_PORT: "3306"
          CPP_CHAT_DB_USER: cpp_chat
          CPP_CHAT_DB_PASSWORD: cpp_chat
          CPP_CHAT_DB_NAME: cpp_chat
        run: ctest --test-dir build -R MySqlConnectionPool --output-on-failure

      - name: Integration test
        env:
          CPP_CHAT_DB_HOST: 127.0.0.1
          CPP_CHAT_DB_PORT: "3306"
          CPP_CHAT_DB_USER: cpp_chat
          CPP_CHAT_DB_PASSWORD: cpp_chat
          CPP_CHAT_DB_NAME: cpp_chat
        run: |
          ./build/cpp_chat_server > /tmp/cpp_chat_server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true; docker compose -f docker/docker-compose.yml down -v' EXIT
          python3 - <<'PY'
          import socket
          import time

          deadline = time.time() + 30
          while time.time() < deadline:
              try:
                  with socket.create_connection(("127.0.0.1", 9000), timeout=1):
                      break
              except OSError:
                  time.sleep(1)
          else:
              raise SystemExit("server did not start listening on 127.0.0.1:9000")
          PY
          python3 scripts/integration_test.py --host 127.0.0.1 --port 9000

      - name: Stop MySQL
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
